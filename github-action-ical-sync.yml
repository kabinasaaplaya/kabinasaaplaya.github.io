# GitHub Action: sync availability.json from Airbnb / Booking.com iCal feeds.
#
# SETUP (one time):
# 1. In your GitHub repo, create the file:  .github/workflows/ical-sync.yml
# 2. Paste this entire file's contents into it.
# 3. Replace the three PASTE_..._ICAL_URL placeholders below with your real
#    export links from Airbnb (Calendar -> Export) and/or Booking.com
#    (Rates & Availability -> Sync calendars -> Export). You can list several
#    URLs per cabin separated by a space (e.g. Airbnb AND Booking feeds).
# 4. Commit. It runs every 6 hours and on demand (Actions tab -> Run workflow).

name: Sync availability from iCal

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # manual "Run workflow" button

permissions:
  contents: write

env:
  MAKILING_ICALS: 'PASTE_MAKILING_ICAL_URL'
  SEMBRANO_ICALS: 'PASTE_SEMBRANO_ICAL_URL'
  BANAHAW_ICALS: 'PASTE_BANAHAW_ICAL_URL'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build availability.json from iCal feeds
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          function fetchText(url, redirects = 5) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location && redirects > 0) {
                  return resolve(fetchText(res.headers.location, redirects - 1));
                }
                let data = '';
                res.on('data', (c) => (data += c));
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          // Parse VEVENT DTSTART/DTEND (DATE or DATE-TIME) into YYYY-MM-DD ranges.
          function parseICS(ics) {
            const ranges = [];
            const events = ics.split('BEGIN:VEVENT').slice(1);
            for (const ev of events) {
              const ds = ev.match(/DTSTART[^:]*:(\d{4})(\d{2})(\d{2})/);
              const de = ev.match(/DTEND[^:]*:(\d{4})(\d{2})(\d{2})/);
              if (!ds || !de) continue;
              const summ = (ev.match(/SUMMARY:(.*)/) || [,''])[1].trim();
              // Skip "available" style events; keep reserved/blocked ones.
              if (/available/i.test(summ) && !/not available/i.test(summ)) continue;
              ranges.push({
                start: `${ds[1]}-${ds[2]}-${ds[3]}`,
                end: `${de[1]}-${de[2]}-${de[3]}`,
                note: 'synced'
              });
            }
            return ranges;
          }

          async function cabin(envKey) {
            const urls = (process.env[envKey] || '').split(/\s+/).filter(u => u.startsWith('http'));
            let all = [];
            for (const u of urls) {
              try { all = all.concat(parseICS(await fetchText(u))); }
              catch (e) { console.error(envKey, 'feed failed:', e.message); }
            }
            all.sort((a, b) => a.start.localeCompare(b.start));
            return all;
          }

          (async () => {
            const out = {
              _comment: 'AUTO-GENERATED by the iCal sync action. Manual edits will be overwritten on the next run — block dates on Airbnb/Booking.com instead.',
              updated: new Date().toISOString().slice(0, 10),
              cabins: {
                makiling: await cabin('MAKILING_ICALS'),
                sembrano: await cabin('SEMBRANO_ICALS'),
                banahaw: await cabin('BANAHAW_ICALS')
              }
            };
            fs.writeFileSync('availability.json', JSON.stringify(out, null, 2) + '\n');
            console.log('Wrote availability.json:',
              out.cabins.makiling.length, '/',
              out.cabins.sembrano.length, '/',
              out.cabins.banahaw.length, 'bookings');
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name 'availability-bot'
          git config user.email 'actions@github.com'
          git add availability.json
          git diff --cached --quiet || git commit -m 'Sync availability from iCal'
          git push
